<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bianca 💜</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      padding:140px 20px 40px;
      overflow-x:hidden;
      position:relative;

      display:flex;
      justify-content:center;

      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(135deg,#8b5cf6,#c084fc,#e9d5ff);

      background-size:cover;
      background-attachment:fixed;
    }

    /* BACKGROUND BLURS */

    .bg-blur{
      position:fixed;
      border-radius:50%;
      filter:blur(100px);
      z-index:0;
      opacity:0.5;
      pointer-events:none;
    }

    .blur1{
      width:300px;
      height:300px;
      background:#ffffff;
      top:-100px;
      left:-100px;
    }

    .blur2{
      width:250px;
      height:250px;
      background:#f0abfc;
      bottom:-80px;
      right:-50px;
    }

    .blur3{
      width:220px;
      height:220px;
      background:#c084fc;
      top:45%;
      left:50%;
      transform:translate(-50%,-50%);
    }

    /* HERO */

    .hero{
      position:absolute;
      top:40px;
      text-align:center;
      z-index:2;
      width:100%;
      padding:0 20px;
    }

    .tag{
      display:inline-block;

      padding:8px 18px;

      border-radius:999px;

      background:rgba(255,255,255,0.15);

      border:1px solid rgba(255,255,255,0.18);

      color:white;

      font-size:0.85rem;

      margin-bottom:18px;

      backdrop-filter:blur(10px);
    }

    .hero-title{
      color:white;
      font-size:2.8rem;
      font-weight:700;
      text-shadow:0 5px 20px rgba(0,0,0,0.15);
    }

    .hero-text{
      color:white;
      opacity:0.92;
      margin-top:10px;
      font-size:1rem;
    }

    /* CONTAINER */

    .container{
      width:100%;
      max-width:950px;

      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

      gap:24px;

      z-index:2;

      align-items:start;
    }

    /* CARD */

    .card{
      position:relative;
      overflow:hidden;

      background:rgba(255,255,255,0.14);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.2);

      border-radius:32px;

      padding:35px 28px;

      text-align:center;

      box-shadow:
        0 10px 40px rgba(0,0,0,0.12),
        inset 0 1px 1px rgba(255,255,255,0.15);

      transition:0.4s ease;

      z-index:2;
    }

    .card:hover{
      transform:translateY(-6px);

      box-shadow:
        0 20px 50px rgba(0,0,0,0.18),
        inset 0 1px 1px rgba(255,255,255,0.2);
    }

    .card::before{
      content:"";

      position:absolute;

      width:220px;
      height:220px;

      background:rgba(255,255,255,0.08);

      border-radius:50%;

      top:-70px;
      right:-70px;
    }

    h1{
      color:white;
      font-size:1.6rem;
      margin-bottom:10px;
      position:relative;
      z-index:2;
    }

    .subtitle{
      color:white;
      opacity:0.9;
      margin-bottom:22px;
      font-size:0.95rem;
      position:relative;
      z-index:2;
    }

    .date{
      color:#fff;
      font-weight:600;
      margin-bottom:22px;
      font-size:1rem;
      position:relative;
      z-index:2;
    }

    /* COUNTER */

    .counter{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      position:relative;
      z-index:2;
    }

    .box{
      background:rgba(255,255,255,0.14);

      border:1px solid rgba(255,255,255,0.15);

      border-radius:22px;

      padding:20px 12px;

      transition:0.3s ease;

      backdrop-filter:blur(10px);
    }

    .box:hover{
      transform:scale(1.04);
      background:rgba(255,255,255,0.2);
    }

    .number{
      color:white;
      font-size:2rem;
      font-weight:700;
      letter-spacing:1px;
    }

    .label{
      color:white;
      opacity:0.9;
      font-size:0.8rem;
      margin-top:5px;
    }

    .message{
      margin-top:24px;
      color:white;
      font-size:0.95rem;
      line-height:1.7;
      opacity:0.95;
      position:relative;
      z-index:2;
    }

    /* SPOTIFY */

    .spotify-container{
      width:100%;
      max-width:550px;

      margin:0 auto;

      padding:10px;

      border-radius:28px;

      background:rgba(255,255,255,0.12);

      backdrop-filter:blur(16px);

      border:1px solid rgba(255,255,255,0.18);

      box-shadow:0 10px 40px rgba(0,0,0,0.15);

      grid-column:1/-1;

      z-index:2;
    }

    .spotify-container iframe{
      width:100%;
      border:none;
      border-radius:20px;
    }

    /* HEARTS */

    .heart{
      position:fixed;
      color:white;
      animation:fall linear infinite;
      opacity:0.7;
      z-index:1;
      pointer-events:none;
    }

    @keyframes fall{

      0%{
        transform:translateY(-10vh) scale(0);
        opacity:0;
      }

      20%{
        opacity:0.8;
      }

      100%{
        transform:translateY(110vh) scale(1.4);
        opacity:0;
      }
    }

    /* MOBILE */

    @media(max-width:768px){

      body{
        padding:130px 15px 30px;
      }

      .hero-title{
        font-size:2rem;
      }

      .hero-text{
        font-size:0.92rem;
      }

      .container{
        grid-template-columns:1fr;
        gap:18px;
      }

      .card{
        padding:28px 20px;
        border-radius:28px;
      }

      h1{
        font-size:1.4rem;
        line-height:1.4;
      }

      .subtitle{
        font-size:0.9rem;
      }

      .counter{
        grid-template-columns:repeat(2,1fr);
        gap:10px;
      }

      .number{
        font-size:1.7rem;
      }

      .message{
        font-size:0.92rem;
      }

      .spotify-container{
        padding:8px;
        border-radius:24px;
      }
    }

  </style>
</head>

<body>

  <!-- BLURS -->
  <div class="bg-blur blur1"></div>
  <div class="bg-blur blur2"></div>
  <div class="bg-blur blur3"></div>

  <!-- HERO -->
  <div class="hero">

    <span class="tag">
      💜 Nosso Cantinho 😝
    </span>

    <h1 class="hero-title">
      Bianca & Pedro
    </h1>


  </div>

  <!-- CONTAINER -->
  <div class="container">

    <!-- CARD 1 -->
    <div class="card">

      <h1>
        1° Vez Pessoalmente💜
      </h1>

      <div class="subtitle">
        Aniversário da Manu?? ✨
      </div>

      <div class="date">
        29/05/2026
      </div>

      <div class="counter">

        <div class="box">
          <div class="number" id="d1">0</div>
          <div class="label">Dias</div>
        </div>

        <div class="box">
          <div class="number" id="h1">0</div>
          <div class="label">Horas</div>
        </div>

        <div class="box">
          <div class="number" id="m1">0</div>
          <div class="label">Min</div>
        </div>

        <div class="box">
          <div class="number" id="s1">0</div>
          <div class="label">Seg</div>
        </div>

      </div>

      <div class="message">
        Quem é Manu? KKKKKKK 💜
      </div>

    </div>

    <!-- CARD 2 -->
    <div class="card">

      <h1>
        ⛪ Bianca 💜
      </h1>

      <div class="subtitle">
        Primeiro culto de jovens juntos ✨
      </div>

      <div class="date">
        31/05/2026
      </div>

      <div class="counter">

        <div class="box">
          <div class="number" id="d2">0</div>
          <div class="label">Dias</div>
        </div>

        <div class="box">
          <div class="number" id="h2">0</div>
          <div class="label">Horas</div>
        </div>

        <div class="box">
          <div class="number" id="m2">0</div>
          <div class="label">Min</div>
        </div>

        <div class="box">
          <div class="number" id="s2">0</div>
          <div class="label">Seg</div>
        </div>

      </div>

      <div class="message">
        Esperando ansiosamentee💜✨
      </div>

    </div>

    <!-- SPOTIFY -->
    <div class="spotify-container">

      <iframe
        src="https://open.spotify.com/embed/track/43BCxznTSBLcXzu4lJ8KW5?utm_source=generator&theme=0"
        height="152"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>

    </div>

  </div>

  <script>

    function createCountdown(targetDate, ids){

      function update(){

        const now = new Date().getTime();
        const distance = targetDate - now;

        if(distance < 0){
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));

        const hours = Math.floor(
          (distance % (1000 * 60 * 60 * 24)) /
          (1000 * 60 * 60)
        );

        const minutes = Math.floor(
          (distance % (1000 * 60 * 60)) /
          (1000 * 60)
        );

        const seconds = Math.floor(
          (distance % (1000 * 60)) / 1000
        );

        document.getElementById(ids.days).innerHTML = days;
        document.getElementById(ids.hours).innerHTML = hours;
        document.getElementById(ids.minutes).innerHTML = minutes;
        document.getElementById(ids.seconds).innerHTML = seconds;
      }

      update();
      setInterval(update,1000);
    }

    // CONTADOR 1
    createCountdown(
      new Date("May 29, 2026 00:00:00").getTime(),
      {
        days:"d1",
        hours:"h1",
        minutes:"m1",
        seconds:"s1"
      }
    );

    // CONTADOR 2
    createCountdown(
      new Date("May 31, 2026 00:00:00").getTime(),
      {
        days:"d2",
        hours:"h2",
        minutes:"m2",
        seconds:"s2"
      }
    );

    // HEARTS
    function createHeart(){

      const heart = document.createElement("div");

      heart.classList.add("heart");
      heart.innerHTML = "💜";

      heart.style.left = Math.random() * 100 + "vw";

      heart.style.fontSize =
        (Math.random() * 20 + 10) + "px";

      heart.style.animationDuration =
        (Math.random() * 5 + 5) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      },10000);
    }

    setInterval(createHeart,300);

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Bianca 💜</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- BACKGROUND -->
  <div class="bg-gradient"></div>

  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>
  <div class="bg-blur blur-3"></div>

  <!-- PAGE -->
  <main class="page">

    <!-- HERO -->
    <section class="hero">

      <div class="hero-badge">
        💜 Nosso Cantinho😝
      </div>

      <h1 class="hero-title">
        Bianca & Pedro😝
      </h1>

      <p class="hero-description">
         ✨
      </p>

    </section>

    <!-- GRID -->
    <section class="cards-grid">

      <!-- CARD -->
      <article class="card">

        <div class="card-glow"></div>

        <h2 class="card-title">
          1° Vez Pessoalmente 💜
        </h2>

        <p class="card-subtitle">
          Aniversário da Manu 
        </p>

        <span class="card-date">
          29/05/2026
        </span>

        <div class="counter">

          <div class="counter-box">
            <span class="counter-number" id="d1">0</span>
            <span class="counter-label">Dias</span>
          </div>

          <div class="counter-box">
            <span class="counter-number" id="h1">0</span>
            <span class="counter-label">Horas</span>
          </div>

          <div class="counter-box">
            <span class="counter-number" id="m1">0</span>
            <span class="counter-label">Min</span>
          </div>

          <div class="counter-box">
            <span class="counter-number" id="s1">0</span>
            <span class="counter-label">Seg</span>
          </div>

        </div>

        <p class="card-message">
          Agora eu sei quem é Manu KKKKKKK 💜
        </p>

      </article>

      <!-- CARD -->
      <article class="card">

        <div class="card-glow"></div>

        <h2 class="card-title">
          ⛪ Bianca 💜
        </h2>

        <p class="card-subtitle">
          Primeiro culto de jovens juntos ✨
        </p>

        <span class="card-date">
          31/05/2026
        </span>

        <div class="counter">

          <div class="counter-box">
            <span class="counter-number" id="d2">0</span>
            <span class="counter-label">Dias</span>
          </div>

          <div class="counter-box">
            <span class="counter-number" id="h2">0</span>
            <span class="counter-label">Horas</span>
          </div>

          <div class="counter-box">
            <span class="counter-number" id="m2">0</span>
            <span class="counter-label">Min</span>
          </div>

          <div class="counter-box">
            <span class="counter-number" id="s2">0</span>
            <span class="counter-label">Seg</span>
          </div>

        </div>

        <p class="card-message">
          Esperando ansiosamenteee 💜✨
        </p>

      </article>

    </section>

    <!-- MUSIC -->
    <section class="music-section">

      <div class="music-card">

        <div class="music-header">

          <span class="music-icon">
            🎵
          </span>

          <div>
            <h3>Nossas Músicas</h3>

          </div>

        </div>

        <iframe
          src="https://open.spotify.com/embed/track/5wG7UpUik9lpxUWjQFadPo?utm_source=generator&theme=0"
          loading="lazy"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bianca 💜</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow:hidden;
      background:linear-gradient(-45deg,#c084fc,#d8b4fe,#e9d5ff,#a855f7);
      background-size:400% 400%;
      animation:bg 12s ease infinite;
      position:relative;
    }

    @keyframes bg{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

 .container{
  width:100%;
  max-width:850px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  z-index:2;
  align-items:start;
}

    .card{
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:30px;
      padding:35px 25px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.15);
      animation:float 4s ease-in-out infinite;
      position:relative;
      overflow:hidden;
    }
    .card:last-of-type{
  max-width:380px;
  justify-self:center;
}

    .card::before{
      content:"";
      position:absolute;
      width:200px;
      height:200px;
      background:rgba(255,255,255,0.08);
      border-radius:50%;
      top:-60px;
      right:-60px;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-8px);
      }
    }

    h1{
      color:white;
      font-size:1.5rem;
      margin-bottom:8px;
    }

    .subtitle{
      color:white;
      opacity:0.9;
      margin-bottom:25px;
      font-size:0.95rem;
    }

    .date{
      color:#fff;
      font-weight:600;
      margin-bottom:20px;
      font-size:1rem;
    }

    .counter{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    .box{
      background:rgba(255,255,255,0.18);
      border-radius:20px;
      padding:18px 10px;
      transition:0.3s;
    }

    .box:hover{
      transform:scale(1.05);
      background:rgba(255,255,255,0.25);
    }

    .number{
      color:white;
      font-size:1.8rem;
      font-weight:700;
    }

    .label{
      color:white;
      opacity:0.9;
      font-size:0.8rem;
      margin-top:5px;
    }

    .message{
      margin-top:25px;
      color:white;
      font-size:0.95rem;
      line-height:1.6;
      opacity:0.95;
    }

    .spotify-container{
      width:100%;
      max-width:500px;
      margin:10px auto 0 auto;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:2;
      grid-column:1 / -1;
    }

    .spotify-container iframe{
      width:100%;
      border:none;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
    }

    .heart{
      position:absolute;
      color:white;
      animation:fall linear infinite;
      opacity:0.7;
      z-index:1;
    }

    @keyframes fall{
      0%{
        transform:translateY(-10vh) scale(0);
        opacity:0;
      }

      20%{
        opacity:0.8;
      }

      100%{
        transform:translateY(110vh) scale(1.4);
        opacity:0;
      }
    }

    @media(max-width:700px){

      
      body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
        overflow:hidden;
        background:linear-gradient(-45deg,#c084fc,#d8b4fe,#e9d5ff,#a855f7);
        background-size:400% 400%;
        animation:bg 12s ease infinite;
        position:relative;
      }
      
      html, body{
        width:100%;
        height:100%;
      }

      .container{
        grid-template-columns:1fr;
      }

      .counter{
        grid-template-columns:repeat(2,1fr);
      }

      h1{
        font-size:1.6rem;
      }

      .number{
        font-size:1.5rem;
      }

      .card{
        padding:30px 20px;
      }

      .spotify-container{
        max-width:100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- CONTADOR MANU -->
    <div class="card">

      <h1>
        1°Vez pessoalmente💜
        <br>
          <div class="subtitle">
        Aniversaio da manu?? 
      </div>
      </h1>

      <div class="date">
        29/05/2026
      </div>

      <div class="counter">

        <div class="box">
          <div class="number" id="d1">0</div>
          <div class="label">Dias</div>
        </div>

        <div class="box">
          <div class="number" id="h1">0</div>
          <div class="label">Horas</div>
        </div>

        <div class="box">
          <div class="number" id="m1">0</div>
          <div class="label">Min</div>
        </div>

        <div class="box">
          <div class="number" id="s1">0</div>
          <div class="label">Seg</div>
        </div>

      </div>

      <div class="message">
        Quem é Manu? KKKKKKKK 💜
      </div>

    </div>

    <!-- CONTADOR IGREJA -->
    <div class="card">

      <h1>⛪ Bianca 💜</h1>

      <div class="subtitle">
        Primeiro culto de jovens juntos ✨
      </div>

      <div class="date">
        31/05/2026
      </div>

      <div class="counter">

        <div class="box">
          <div class="number" id="d2">0</div>
          <div class="label">Dias</div>
        </div>

        <div class="box">
          <div class="number" id="h2">0</div>
          <div class="label">Horas</div>
        </div>

        <div class="box">
          <div class="number" id="m2">0</div>
          <div class="label">Min</div>
        </div>

        <div class="box">
          <div class="number" id="s2">0</div>
          <div class="label">Seg</div>
        </div>

      </div>

      <div class="message">
        Esperando ansiosamente 💜✨
      </div>

    </div>

    <!-- SPOTIFY -->
    <div class="spotify-container">
      <iframe 
        data-testid="embed-iframe"
        src="https://open.spotify.com/embed/track/43BCxznTSBLcXzu4lJ8KW5?utm_source=generator&theme=0"
        height="152"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>
    </div>

  </div>

  <script>

    function createCountdown(targetDate, ids){

      function update(){

        const now = new Date().getTime();
        const distance = targetDate - now;

        if(distance < 0){
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById(ids.days).innerHTML = days;
        document.getElementById(ids.hours).innerHTML = hours;
        document.getElementById(ids.minutes).innerHTML = minutes;
        document.getElementById(ids.seconds).innerHTML = seconds;
      }

      update();
      setInterval(update,1000);
    }

    // 29/05/2026
    createCountdown(
      new Date("May 29, 2026 00:00:00").getTime(),
      {
        days:"d1",
        hours:"h1",
        minutes:"m1",
        seconds:"s1"
      }
    );

    // 31/05/2026
    createCountdown(
      new Date("May 31, 2026 00:00:00").getTime(),
      {
        days:"d2",
        hours:"h2",
        minutes:"m2",
        seconds:"s2"
      }
    );

    // CORAÇÕES
    function createHeart(){

      const heart = document.createElement("div");

      heart.classList.add("heart");
      heart.innerHTML = "💜";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 10) + "px";
      heart.style.animationDuration = (Math.random() * 5 + 5) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      },10000);
    }

    setInterval(createHeart,300);

  </script>

</body>
</html>
